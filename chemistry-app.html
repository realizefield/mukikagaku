<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高校化学・無機化学 学習プログラム</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #FFF7ED 0%, #FEF3C7 30%, #DBEAFE 70%, #EDE9FE 100%);
    min-height: 100vh;
    color: #111;
    line-height: 1.5;
  }
  button { font-family: inherit; }
  .container { max-width: 960px; margin: 0 auto; padding: 20px 16px; }

  /* ---------- Header ---------- */
  .header {
    background: linear-gradient(135deg, #fff, #fef3c7);
    border-radius: 24px;
    padding: 24px 28px;
    margin-bottom: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,.08);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: ''; position: absolute; top: -30px; right: -30px;
    width: 160px; height: 160px; border-radius: 50%;
    background: radial-gradient(circle, rgba(251,191,36,.27), transparent);
  }
  .header::after {
    content: ''; position: absolute; bottom: -40px; left: -20px;
    width: 130px; height: 130px; border-radius: 50%;
    background: radial-gradient(circle, rgba(96,165,250,.2), transparent);
  }
  .header-inner { position: relative; }
  .header-tag { font-size: 13px; color: #888; letter-spacing: 2px; margin-bottom: 4px; }
  .header-title {
    font-size: 32px; font-weight: 900; margin: 0;
    background: linear-gradient(135deg, #F59E0B, #EC4899, #8B5CF6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-sub { font-size: 14px; color: #666; margin-top: 4px; }
  .stat-row { display: flex; gap: 16px; margin-top: 20px; flex-wrap: wrap; }
  .stat-card {
    background: #fff; border-radius: 12px; padding: 12px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,.05); flex: 1; min-width: 140px;
  }
  .stat-label { font-size: 11px; color: #999; }
  .stat-val { font-size: 24px; font-weight: 800; }
  .stat-val.amber { color: #F59E0B; }
  .stat-val.purple { color: #8B5CF6; }
  .stat-bar { height: 6px; background: #F3F4F6; border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .stat-bar-fill { height: 100%; background: linear-gradient(90deg, #F59E0B, #EC4899); transition: width .5s; }

  /* ---------- Legend ---------- */
  .legend {
    background: #fff; border-radius: 16px; padding: 14px 18px;
    margin-bottom: 16px; font-size: 13px; color: #555;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }
  .legend-title { font-weight: 700; margin-bottom: 6px; font-size: 14px; }
  .legend-items { display: flex; gap: 14px; flex-wrap: wrap; }
  .mark-dot {
    display: inline-block; width: 22px; height: 22px; border-radius: 50%;
    color: #fff; text-align: center; font-weight: 700; line-height: 22px; font-size: 12px;
  }
  .mark-A { background: #10B981; }
  .mark-B { background: #F59E0B; }
  .mark-C { background: #EF4444; }

  /* ---------- Unit Grid ---------- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .unit-card {
    background: #fff; border-radius: 18px; padding: 16px;
    box-shadow: 0 4px 14px rgba(0,0,0,.06);
    position: relative; overflow: hidden;
    transition: transform .2s, box-shadow .2s;
    border: 2px solid transparent;
  }
  .unit-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.1); }
  .unit-card.passed { border-color: var(--unit-color); }
  .unit-card-blob {
    position: absolute; top: -20px; right: -20px;
    width: 90px; height: 90px; border-radius: 50%;
    background: var(--unit-bg); opacity: .55;
  }
  .unit-card-inner { position: relative; }
  .unit-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .unit-symbol {
    width: 44px; height: 44px; border-radius: 10px;
    background: linear-gradient(135deg, var(--unit-color), var(--unit-color-d));
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 18px;
    box-shadow: 0 3px 8px var(--unit-glow);
  }
  .unit-title { font-size: 17px; font-weight: 800; color: #111; }
  .unit-idx { font-size: 11px; color: #aaa; }
  .unit-check { font-size: 22px; }
  .unit-intro-mini { font-size: 12.5px; color: #666; margin-bottom: 10px; line-height: 1.45; min-height: 36px; }
  .unit-stats {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; font-size: 11px; color: #888; flex-wrap: wrap; gap: 4px;
  }
  .mark-row { display: flex; gap: 4px; margin-bottom: 10px; }
  .mark-btn {
    flex: 1; padding: 6px 0; font-size: 12px; font-weight: 700;
    border-radius: 8px; cursor: pointer; transition: all .15s;
    background: #fff;
  }
  .mark-btn.A { border: 2px solid #10B981; color: #10B981; }
  .mark-btn.B { border: 2px solid #F59E0B; color: #F59E0B; }
  .mark-btn.C { border: 2px solid #EF4444; color: #EF4444; }
  .mark-btn.active.A { background: #10B981; color: #fff; }
  .mark-btn.active.B { background: #F59E0B; color: #fff; }
  .mark-btn.active.C { background: #EF4444; color: #fff; }

  .start-btn {
    width: 100%; padding: 11px; font-size: 14px; font-weight: 700;
    border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--unit-color), var(--unit-color-d));
    color: #fff; cursor: pointer;
    box-shadow: 0 3px 10px var(--unit-glow);
    transition: transform .15s;
  }
  .start-btn:hover { transform: scale(1.02); }

  .reset-row { margin-top: 24px; text-align: center; }
  .reset-btn {
    padding: 8px 18px; font-size: 12px; border: 1px solid #ddd;
    background: #fff; color: #999; border-radius: 16px; cursor: pointer;
  }
  .reset-btn:hover { color: #EF4444; border-color: #EF4444; }
  .footer { text-align: center; color: #999; font-size: 12px; margin-top: 20px; padding: 16px; }

  /* ---------- Unit Detail ---------- */
  .unit-page-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    padding: 14px 20px; background: #fff; border-radius: 18px;
    box-shadow: 0 4px 12px rgba(0,0,0,.06);
  }
  .back-btn {
    padding: 7px 14px; font-size: 14px; border: none; border-radius: 16px;
    background: #f3f4f6; cursor: pointer; font-weight: 600;
  }
  .back-btn:hover { background: #e5e7eb; }
  .unit-head-info { flex: 1; }
  .unit-head-name { font-size: 22px; font-weight: 800; color: #111; }
  .unit-head-meta { font-size: 12px; color: #666; }

  .tabs { display: flex; gap: 6px; margin-bottom: 16px; background: #fff; padding: 6px; border-radius: 14px; }
  .tab-btn {
    flex: 1; padding: 10px 0; font-size: 14px; font-weight: 700;
    border: none; border-radius: 10px; background: transparent;
    color: #666; cursor: pointer; transition: all .2s;
  }
  .tab-btn.active { background: var(--unit-color); color: #fff; }

  .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 12px rgba(0,0,0,.06); }
  .card + .card { margin-top: 16px; }

  .intro-box {
    padding: 14px 18px; background: var(--unit-bg);
    border-left: 4px solid var(--unit-color);
    border-radius: 8px; color: #333; line-height: 1.7; font-size: 15px;
  }
  .audio-box {
    background: linear-gradient(135deg, #FEF3C7, #FED7AA);
    border-radius: 16px; padding: 16px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
    border: 2px dashed #F59E0B;
  }
  .audio-icon { font-size: 32px; }
  .audio-title { font-weight: 700; font-size: 15px; }
  .audio-sub { font-size: 13px; color: #78350F; }
  .audio-btn {
    padding: 8px 14px; font-size: 13px; border-radius: 16px;
    border: none; background: #fff; color: #9ca3af; cursor: not-allowed;
  }

  .card-h { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--unit-color); }

  /* Explanation sections */
  .explain-section {
    margin-bottom: 16px; padding: 14px 16px;
    background: #fafafa; border-radius: 12px;
    border-left: 3px solid var(--unit-color);
  }
  .explain-section:last-child { margin-bottom: 0; }
  .explain-h { font-size: 16px; font-weight: 700; color: var(--unit-color-d); margin-bottom: 8px; }
  .explain-p { font-size: 14.5px; line-height: 1.8; color: #333; white-space: pre-wrap; }

  /* Key points — using highlights */
  .kp-list { margin: 0; padding-left: 0; list-style: none; }
  .kp-list li {
    padding: 8px 12px; margin-bottom: 6px; font-size: 14.5px; line-height: 1.6;
    background: #fff; border-radius: 10px;
    border-left: 3px solid #e5e7eb;
  }
  .kp-list li.star {
    background: linear-gradient(90deg, #FEF3C7, #fff);
    border-left-color: #F59E0B;
    font-weight: 600;
  }
  .kp-list li.star2 {
    background: linear-gradient(90deg, #FEE2E2, #fff);
    border-left-color: #EF4444;
    font-weight: 700;
  }
  .kp-list li.memorize {
    background: linear-gradient(90deg, #DBEAFE, #fff);
    border-left-color: #3B82F6;
  }

  table.info-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.info-table th {
    padding: 10px 12px; background: var(--unit-color); color: #fff;
    text-align: left;
  }
  table.info-table th:first-child { border-radius: 8px 0 0 0; }
  table.info-table th:last-child { border-radius: 0 8px 0 0; }
  table.info-table td { padding: 10px 12px; border-bottom: 1px solid #eee; vertical-align: top; }
  table.info-table tr:nth-child(even) td { background: var(--unit-bg); }

  .two-btn-row { display: flex; gap: 12px; margin-top: 14px; }
  .btn-primary {
    flex: 1; padding: 16px; font-size: 16px; font-weight: 800;
    border: none; border-radius: 14px; color: #fff; cursor: pointer;
    background: linear-gradient(135deg, var(--unit-color), var(--unit-color-d));
    box-shadow: 0 4px 14px var(--unit-glow);
    transition: transform .15s;
  }
  .btn-primary:hover { transform: scale(1.02); }
  .btn-secondary {
    flex: 1; padding: 16px; font-size: 16px; font-weight: 800;
    border-radius: 14px; cursor: pointer;
    background: #fff; color: var(--unit-color);
    border: 2px solid var(--unit-color);
  }
  .btn-secondary:hover { background: var(--unit-bg); }

  /* ---------- Practice (fill-in blanks) ---------- */
  .practice-meta {
    margin-bottom: 12px; padding: 10px 16px; background: #fff;
    border-radius: 12px; font-size: 13px; color: #666;
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px;
  }
  .practice-card {
    background: #fff; border-radius: 20px; padding: 24px 20px;
    box-shadow: 0 6px 24px rgba(0,0,0,.08);
  }
  .practice-top { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; color: #666; }
  .problem-text { font-size: 16.5px; line-height: 2.3; margin-bottom: 20px; white-space: pre-wrap; }
  .blank {
    display: inline-block; min-width: 80px; padding: 4px 12px;
    margin: 0 4px; border-radius: 10px;
    border: 2px dashed #ccc; background: #fafafa;
    color: #333; text-align: center; font-weight: 600;
    cursor: default; transition: all .2s; vertical-align: baseline;
  }
  .blank.filled { border: 2px solid #10B981; background: #fff; cursor: pointer; }
  .blank.correct { background: #D1FAE5; color: #065F46; border-color: #10B981; }
  .blank.wrong { background: #FEE2E2; color: #991B1B; border-color: #EF4444; animation: shake .4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .bank-label { font-size: 13px; color: #888; margin-bottom: 8px; }
  .bank { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .bank-word {
    padding: 8px 14px; font-size: 15px; border: none; border-radius: 20px;
    cursor: pointer; font-weight: 600;
    background: linear-gradient(135deg, #A5F3FC, #67E8F9); color: #164E63;
    box-shadow: 0 2px 6px rgba(0,0,0,.08);
    transition: all .2s;
  }
  .bank-word:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,.12); }
  .bank-word:disabled {
    background: #e5e7eb; color: #9ca3af; cursor: not-allowed;
    opacity: .4; box-shadow: none;
  }

  .judge-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .judge-btn {
    padding: 12px 28px; font-size: 16px; font-weight: 700;
    border: none; border-radius: 30px;
    background: linear-gradient(135deg, #F59E0B, #EF4444);
    color: #fff; cursor: pointer;
    box-shadow: 0 4px 12px rgba(245,158,11,.3);
  }
  .judge-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
  .feedback-pass { color: #10B981; font-weight: 700; font-size: 18px; }
  .feedback-fail { color: #EF4444; font-weight: 700; font-size: 17px; }

  .nav-row { display: flex; gap: 10px; margin-top: 16px; }
  .nav-btn {
    padding: 14px; font-size: 15px; font-weight: 700;
    border-radius: 14px; cursor: pointer; background: #fff;
  }
  .nav-btn.prev {
    flex: 1; color: var(--unit-color); border: 2px solid var(--unit-color);
  }
  .nav-btn.prev:disabled { color: #ccc; border-color: #eee; cursor: not-allowed; }
  .nav-btn.next {
    flex: 2; color: #fff; border: none;
    background: linear-gradient(135deg, var(--unit-color), var(--unit-color-d));
  }

  /* ---------- Quiz ---------- */
  .quiz-card { background: #fff; border-radius: 20px; padding: 28px; box-shadow: 0 6px 24px rgba(0,0,0,.08); }
  .quiz-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .quiz-progress-dots { display: flex; gap: 4px; }
  .quiz-dot { width: 22px; height: 5px; border-radius: 3px; background: #e5e7eb; }
  .quiz-dot.ok { background: #10B981; }
  .quiz-dot.ng { background: #EF4444; }
  .quiz-dot.current { background: #F59E0B; }
  .quiz-q { font-size: 18px; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
  .quiz-choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .quiz-choice {
    text-align: left; padding: 14px 18px; font-size: 16px;
    border: 2px solid #e5e7eb; border-radius: 14px; background: #fff;
    cursor: pointer; transition: all .15s; font-weight: 500;
  }
  .quiz-choice:hover:not(:disabled) { border-color: #F59E0B; }
  .quiz-choice.selected { border-color: #F59E0B; background: #FEF3C7; font-weight: 700; }
  .quiz-choice:disabled { cursor: default; }
  .quiz-choice .num { color: #F59E0B; font-weight: 700; margin-right: 8px; }
  .quiz-short-input {
    width: 100%; padding: 14px 18px; font-size: 16px;
    border: 2px solid #e5e7eb; border-radius: 14px;
    margin-bottom: 20px; outline: none;
  }
  .quiz-short-input:focus { border-color: #F59E0B; }
  .quiz-submit {
    padding: 12px 28px; font-size: 16px; font-weight: 700;
    border: none; border-radius: 24px;
    background: linear-gradient(135deg, #F59E0B, #EF4444);
    color: #fff; cursor: pointer;
  }
  .quiz-submit:disabled { background: #ccc; cursor: not-allowed; }
  .quiz-fb-ok { color: #10B981; font-weight: 700; font-size: 17px; margin-bottom: 12px; }
  .quiz-fb-ng { color: #EF4444; font-weight: 700; font-size: 17px; margin-bottom: 12px; }

  /* Quiz Result */
  .result-icon { font-size: 52px; margin-bottom: 10px; text-align: center; }
  .result-score { font-size: 28px; font-weight: 800; margin-bottom: 8px; text-align: center; }
  .result-score.pass { color: #10B981; }
  .result-score.fail { color: #F59E0B; }
  .result-msg { font-size: 16px; color: #666; margin-bottom: 24px; text-align: center; }
  .result-review {
    text-align: left; max-height: 280px; overflow: auto;
    margin-bottom: 20px; padding: 12px; background: #f9fafb; border-radius: 12px;
  }
  .result-item { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
  .result-item .wrong-info { color: #EF4444; margin-top: 4px; }
  .result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .result-retry {
    padding: 12px 24px; font-size: 15px; font-weight: 700;
    border: none; border-radius: 24px; background: #E0E7FF; color: #3730A3; cursor: pointer;
  }
  .result-back {
    padding: 12px 24px; font-size: 15px; font-weight: 700; border: none;
    border-radius: 24px; background: linear-gradient(135deg, #10B981, #059669);
    color: #fff; cursor: pointer; box-shadow: 0 4px 12px rgba(16,185,129,.3);
  }
  .result-back.neutral {
    background: #F3F4F6; color: #333; box-shadow: none;
  }

  /* Confetti */
  .confetti {
    position: fixed; top: -20px; width: 12px; height: 12px;
    z-index: 9999; pointer-events: none;
  }
  @keyframes fall { to { transform: translateY(105vh) rotate(720deg); } }

  /* Hidden */
  .hidden { display: none !important; }

  /* Mobile tweaks */
  @media (max-width: 520px) {
    .header { padding: 18px 20px; }
    .header-title { font-size: 24px; }
    .container { padding: 12px 10px; }
    .card { padding: 16px; }
    .problem-text { font-size: 15.5px; line-height: 2.1; }
    .quiz-card { padding: 20px 16px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="app"></div>

<!-- Load unit data -->
<script>
// ============================================================
// 単元データ (初めての生徒にもわかりやすい「ですます調」解説)
// ★マーク = 特に重要なポイント
// 【暗記】= テストに出る要暗記事項
// ============================================================
const UNITS = [
  {
    id: 'hydrogen',
    name: '水素',
    symbol: 'H',
    color: '#FF6B9D',
    colorD: '#E54B7D',
    bgColor: '#FFE5EE',
    intro: '宇宙で一番多い元素、それが水素です。燃料電池やロケットの燃料としても使われていて、これからの「クリーンエネルギー」の主役とも言われています。身近では、実は水(H₂O)の中にもたくさん水素が含まれていますね。',
    explain: [
      { h: '水素ってどんな元素?', p: '水素Hは元素記号で書くと一番シンプルで、原子番号は1番。周期表の一番左上に住んでいる、すべての元素の「長男」です。地球上では単体(水素ガスH₂)としてはほとんど存在していません。ほとんどが水や有機物の中に「化合物」として隠れています。' },
      { h: '★ 性質をまず3つ覚えましょう', p: '① 空気より軽い(一番軽い気体です)\n② 水に溶けにくい\n③ 色もにおいもない\nこの3つから、気体を集めるときは「水上置換法(水の中でひっくり返して集める)」を使います。これはとても重要です！' },
      { h: '作り方(製法)を覚えるコツ', p: '化学では「工業的製法」(大量に作る方法)と「実験室的製法」(学校の理科室で少量作る方法)の2つがあります。\n\n【実験室では】亜鉛Znに希塩酸HClを加える → Zn + 2HCl → ZnCl₂ + H₂↑\nイオン化傾向が水素より大きい金属(ZnやFeなど)は、酸と反応して水素を追い出してくれるのです。\n\n【工業的には】水の電気分解、または高温の水蒸気を鉄・コークス・メタンに当てる方法が使われます。' },
      { h: '💡 どこで使われているの?', p: '燃料電池自動車(FCV)、ロケットの燃料(液体水素)、アンモニアの合成原料 — 21世紀の「水素社会」の主役候補です。また、金属を還元して取り出す還元剤としても重要で、タングステンWなどの金属はH₂で還元して作られます。' }
    ],
    keyPoints: [
      '【暗記】水素は地球上では単体ではほとんど存在せず、化合物(水など)として存在',
      '【暗記】空気より軽い・水に溶けにくい → 水上置換で集める',
      '【暗記】実験室的製法: 亜鉛Zn + 希塩酸HCl → ZnCl₂ + H₂↑',
      '★ 工業的製法: ①水の電気分解 ②コークス/鉄/メタン + 水蒸気',
      '水素は燃料電池・ロケット燃料・アンモニア合成に使われる',
      'イオン化傾向が水素より大きい金属(Zn、Fe、Mgなど)は酸と反応してH₂を発生する'
    ],
    table: {
      title: '水素の製法まとめ',
      headers: ['分類', '方法', '反応式'],

<script>
// ============================================================
// Storage helpers — localStorage for persistence
// ============================================================
const STORAGE_KEY = 'chem-inorganic-progress-v2';

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return {};
}
function saveProgress(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {}
}

let state = {
  progress: loadProgress(),
  activeUnit: null,
  tab: 'learn',      // learn | practice | test
  blankIdx: 0,
  // practice state
  blanks: [],
  bankUsed: [],
  judged: false,
  result: null,
  startTime: 0,
  timerId: null,
  elapsed: 0,
  // quiz state
  quizI: 0,
  quizAnswers: [],
  quizChoice: null,
  quizShortVal: '',
  quizFeedback: null,
  quizShowResult: false
};

// ============================================================
// Helpers
// ============================================================
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function classifyKeyPoint(kp) {
  if (kp.startsWith('★★')) return 'star2';
  if (kp.startsWith('★')) return 'star';
  if (kp.startsWith('【暗記】')) return 'memorize';
  return '';
}

function showConfetti() {
  const colors = ['#FF6B9D', '#F59E0B', '#10B981', '#3B82F6', '#8B5CF6', '#EC4899', '#14B8A6'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = (Math.random() * 100) + '%';
    el.style.background = colors[i % colors.length];
    el.style.borderRadius = (i % 2 === 0) ? '50%' : '2px';
    const dur = 2 + Math.random() * 2;
    const delay = Math.random() * 0.5;
    el.style.animation = `fall ${dur}s ${delay}s ease-in forwards`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + delay) * 1000 + 200);
  }
}

function updateUnitProgress(unitId, patch) {
  const p = state.progress[unitId] || {};
  state.progress[unitId] = { ...p, ...patch };
  saveProgress(state.progress);
}

        <div class="header-sub">江原予備校オリジナル × 数研出版 即効化学 準拠</div>
        <div class="stat-row">
          <div class="stat-card">
            <div class="stat-label">進捗</div>
            <div class="stat-val amber">${totalPassed} / ${UNITS.length} <span style="font-size:13px;color:#888;">単元</span></div>
            <div class="stat-bar"><div class="stat-bar-fill" style="width:${totalPct}%"></div></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">総復習回数</div>
            <div class="stat-val purple">${totalReviews}<span style="font-size:13px;color:#888;"> 回</span></div>
            <div style="font-size:11px;color:#666;margin-top:6px;">${totalReviews >= 30 ? '🏆 マスター級' : totalReviews >= 10 ? '🔥 がんばってる！' : '📚 積み重ね中'}</div>
          </div>
        </div>
      </div>
    </div>
  `;

  // Legend
  html += `
    <div class="legend">
      <div class="legend-title">🎯 自己評価マーク (単元ごとにタップで変更できます)</div>
      <div class="legend-items">
        <span><span class="mark-dot mark-A">A</span> OK</span>
        <span><span class="mark-dot mark-B">B</span> 復習必要</span>
        <span><span class="mark-dot mark-C">C</span> 何度も復習</span>
      </div>
    </div>
  `;

  // Grid
  html += '<div class="grid">';
  UNITS.forEach((u, i) => {
    const p = state.progress[u.id] || {};
    const cssVars = `--unit-color:${u.color};--unit-color-d:${u.colorD};--unit-bg:${u.bgColor};--unit-glow:${u.color}66`;
    html += `
      <div class="unit-card ${p.passed ? 'passed' : ''}" style="${cssVars}">
        <div class="unit-card-blob"></div>
        <div class="unit-card-inner">
          <div class="unit-head">
            <div class="unit-symbol">${escapeHtml(u.symbol)}</div>
            <div style="flex:1;">
              <div class="unit-idx">単元 ${i + 1}</div>
              <div class="unit-title">${escapeHtml(u.name)}</div>
            </div>
            ${p.passed ? '<div class="unit-check">✅</div>' : ''}
          </div>
          <div class="unit-intro-mini">${escapeHtml(u.intro.slice(0, 58))}…</div>
          <div class="unit-stats">
            <span>🔁 ${p.reviewCount || 0}回</span>
            <span>📝 ${p.testsPassed || 0}回</span>
            ${p.bestScore ? `<span>🏆 ${p.bestScore}%</span>` : ''}
          </div>
          <div class="mark-row">
            ${['A','B','C'].map(m => `
              <button class="mark-btn ${m} ${p.mark === m ? 'active' : ''}"
                onclick="event.stopPropagation(); setMark('${u.id}', '${m}')">${m}</button>
            `).join('')}
          </div>
          <button class="start-btn" onclick="openUnit('${u.id}')">学習を開始 →</button>
        </div>
      </div>
    `;
  });
  html += '</div>';

  html += `
    <div class="reset-row">
      <button class="reset-btn" onclick="resetAll()">🗑 すべての記録をリセット</button>
    </div>
    <div class="footer">江原予備校 × 数研出版 即効化学 対応 / 高校化学 無機化学 学習プログラム</div>
  `;

  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

function setMark(unitId, mark) {
  const current = (state.progress[unitId] || {}).mark;
  updateUnitProgress(unitId, { mark: current === mark ? null : mark });
  renderDashboard();
}

function resetAll() {
  if (!confirm('すべての学習記録を削除します。よろしいですか？')) return;
  state.progress = {};
  saveProgress({});
  renderDashboard();
}

function openUnit(unitId) {
  state.activeUnit = unitId;
  state.tab = 'learn';
  state.blankIdx = 0;
  resetPracticeState();
  resetQuizState();
  window.scrollTo(0, 0);
  renderUnitView();
}

function backToDashboard() {
  state.activeUnit = null;
  stopTimer();
  renderDashboard();
}

function goNextUnit() {
  const idx = UNITS.findIndex(u => u.id === state.activeUnit);
  const next = UNITS[(idx + 1) % UNITS.length];
  openUnit(next.id);
}

function setTab(tab) {
  state.tab = tab;
  state.blankIdx = 0;
  resetPracticeState();
  resetQuizState();
  renderUnitView();
}

function resetPracticeState() {
  const u = UNITS.find(x => x.id === state.activeUnit);
  if (!u) return;
  const fb = u.fillBlanks[state.blankIdx];
  if (!fb) return;
  state.blanks = fb.answers.map(() => null);
  state.bankUsed = fb.bank.map(() => false);
  state.judged = false;
  state.result = null;
  state.elapsed = 0;
  state.startTime = Date.now();
}

function resetQuizState() {
  state.quizI = 0;
  state.quizAnswers = [];
  state.quizChoice = null;
  state.quizShortVal = '';
  state.quizFeedback = null;
  state.quizShowResult = false;
}

function startTimer() {
  stopTimer();
  state.timerId = setInterval(() => {
    state.elapsed = Math.floor((Date.now() - state.startTime) / 1000);
    const el = document.getElementById('timer-display');
    if (el) el.textContent = '⏱ ' + state.elapsed + '秒';
  }, 500);
}

function stopTimer() {
  if (state.timerId) {
    clearInterval(state.timerId);
    state.timerId = null;
  }
}

// ============================================================
// Render: Unit Detail View
// ============================================================
function renderUnitView() {
  const u = UNITS.find(x => x.id === state.activeUnit);
  if (!u) { renderDashboard(); return; }
  const p = state.progress[u.id] || {};
  const cssVars = `--unit-color:${u.color};--unit-color-d:${u.colorD};--unit-bg:${u.bgColor};--unit-glow:${u.color}66`;

  let html = `<div class="container" style="${cssVars}">`;

  // Header
  html += `
    <div class="unit-page-header">
      <button class="back-btn" onclick="backToDashboard()">← 単元表</button>
      <div class="unit-head-info">
        <div class="unit-head-name">${escapeHtml(u.name)} ${p.passed ? '✅' : ''}</div>
        <div class="unit-head-meta">復習 ${p.reviewCount || 0}回 ・ 合格 ${p.testsPassed || 0}回 ${p.bestScore ? '・ 最高 ' + p.bestScore + '%' : ''}</div>
      </div>
      <div class="unit-symbol" style="width:40px;height:40px;font-size:16px;">${escapeHtml(u.symbol)}</div>
    </div>
  `;

  // Tabs
  html += `
    <div class="tabs">
      <button class="tab-btn ${state.tab === 'learn' ? 'active' : ''}" onclick="setTab('learn')">📖 学ぶ</button>
      <button class="tab-btn ${state.tab === 'practice' ? 'active' : ''}" onclick="setTab('practice')">✏️ 練習</button>
      <button class="tab-btn ${state.tab === 'test' ? 'active' : ''}" onclick="setTab('test')">📝 確認テスト</button>
    </div>
  `;

  if (state.tab === 'learn') html += renderLearnTab(u);
  else if (state.tab === 'practice') html += renderPracticeTab(u);
  else if (state.tab === 'test') html += renderTestTab(u);

  html += '</div>';
  document.getElementById('app').innerHTML = html;

  // Start timer for practice
  if (state.tab === 'practice' && !state.judged) {
    state.startTime = Date.now() - (state.elapsed * 1000);
    startTimer();
  } else {
    stopTimer();
  }
}

// ---------- Learn Tab ----------
function renderLearnTab(u) {
  let html = '';

  // Audio placeholder
  html += `
    <div class="audio-box">
      <div class="audio-icon">🎧</div>
      <div style="flex:1;">
        <div class="audio-title">音声解説(4分)</div>
        <div class="audio-sub">この単元のポイントを音声で解説します。(準備中)</div>
      </div>
      <button class="audio-btn">▶ 再生</button>
    </div>
  `;

  // Intro
  html += `
    <div class="card">
      <div class="intro-box">${escapeHtml(u.intro)}</div>
    </div>
  `;

  // Explanation sections
  html += '<div class="card"><div class="card-h">📚 解説</div>';
  u.explain.forEach(sec => {
    html += `
      <div class="explain-section">
        <div class="explain-h">${escapeHtml(sec.h)}</div>
        <div class="explain-p">${escapeHtml(sec.p)}</div>
      </div>
    `;
  });
  html += '</div>';

  // Key points
  html += '<div class="card"><div class="card-h">⭐ 重要ポイント</div>';
  html += '<ul class="kp-list">';
  u.keyPoints.forEach(kp => {
    const cls = classifyKeyPoint(kp);
    html += `<li class="${cls}">${escapeHtml(kp)}</li>`;
  });
  html += '</ul>';
  html += `
    <div style="margin-top:12px;padding:10px 14px;background:#f9fafb;border-radius:8px;font-size:12px;color:#666;">
      凡例: <span style="color:#EF4444;font-weight:700;">★★</span> 超重要 ・
      <span style="color:#F59E0B;font-weight:700;">★</span> 重要 ・
      <span style="color:#3B82F6;font-weight:700;">【暗記】</span> 覚える項目
    </div>
  `;
  html += '</div>';

  // Table
  if (u.table) {
    html += '<div class="card"><div class="card-h">📊 ' + escapeHtml(u.table.title) + '</div>';
    html += '<div style="overflow-x:auto;"><table class="info-table"><thead><tr>';
    u.table.headers.forEach(h => html += `<th>${escapeHtml(h)}</th>`);
    html += '</tr></thead><tbody>';
    u.table.rows.forEach(row => {
      html += '<tr>';
      row.forEach(cell => html += `<td>${escapeHtml(cell)}</td>`);
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
  }

  // Nav buttons
  html += `
    <div class="two-btn-row">
      <button class="btn-secondary" onclick="backToDashboard()">📋 単元表に戻る</button>
      <button class="btn-primary" onclick="goNextUnit()">次の単元へ →</button>
    </div>
  `;

  return html;
}

// ---------- Practice Tab ----------
function renderPracticeTab(u) {
  const fb = u.fillBlanks[state.blankIdx];
  if (!fb) return '<div class="card">問題がありません。</div>';

  // Build problem text with blanks
  let problemHtml = escapeHtml(fb.text);
  fb.answers.forEach((_, i) => {
    const val = state.blanks[i];
    let cls = 'blank';
    let content = '___';
    if (state.judged && state.result) {
      const r = state.result[i];
      cls += r ? ' filled correct' : ' filled wrong';
      content = escapeHtml(val || '___');
    } else if (val !== null) {
      cls += ' filled';
      content = escapeHtml(val);
    }
    const clickHandler = (val !== null && !state.judged) ? `onclick="removeFromBlank(${i})"` : '';
    problemHtml = problemHtml.replace(
      '{' + i + '}',
      `<span class="${cls}" ${clickHandler}>${content}</span>`
    );
  });

  const allFilled = state.blanks.every(x => x !== null);

  let html = '';
  html += `
    <div class="practice-meta">
      <span>📝 問題 ${state.blankIdx + 1} / ${u.fillBlanks.length}</span>
      <span id="timer-display">⏱ ${state.elapsed}秒</span>
    </div>
  `;

  html += '<div class="practice-card">';
  html += `<div class="practice-top"><span>語群から選んで空欄をタップしてください</span></div>`;
  html += `<div class="problem-text">${problemHtml}</div>`;

  // Bank
  html += '<div class="bank-label">📦 語群</div>';
  html += '<div class="bank">';
  fb.bank.forEach((w, i) => {
    const disabled = state.bankUsed[i] || state.judged;
    html += `<button class="bank-word" ${disabled ? 'disabled' : ''} onclick="placeWord(${i})">${escapeHtml(w)}</button>`;
  });
  html += '</div>';

  // Judge / feedback area
  if (!state.judged) {
    html += `
      <div class="judge-row">
        <button class="judge-btn" ${allFilled ? '' : 'disabled'} onclick="judge()">答え合わせ →</button>
        ${allFilled ? '' : '<span style="font-size:13px;color:#888;">すべての空欄を埋めてください</span>'}
      </div>
    `;
  } else {
    const allOk = state.result.every(x => x);
    if (allOk) {
      html += `
        <div class="feedback-pass">🎉 合格です！ よくできました！ (${state.elapsed}秒)</div>
        <div style="margin-top:12px;">
          <button class="judge-btn" onclick="nextPractice()">次の問題へ →</button>
        </div>
      `;
    } else {
      html += `
        <div class="feedback-fail">…と少し！ 間違った部分を見直しましょう。</div>
        <div style="margin-top:8px;font-size:13px;color:#666;">赤くなった箇所の語を、もう一度選びなおしてください。</div>
      `;
    }
  }
  html += '</div>';

  // Nav
  html += `
    <div class="nav-row">
      <button class="nav-btn prev" ${state.blankIdx === 0 ? 'disabled' : ''} onclick="prevPractice()">← 前へ</button>
      <button class="nav-btn next" onclick="nextPractice()">
        ${state.blankIdx < u.fillBlanks.length - 1 ? '次の問題 →' : '練習終了 → 単元表'}
      </button>
    </div>
  `;

  return html;
}

function placeWord(bankIdx) {
  const u = UNITS.find(x => x.id === state.activeUnit);
  const fb = u.fillBlanks[state.blankIdx];
  if (state.judged) return;
  // Find first empty blank
  const emptyIdx = state.blanks.findIndex(x => x === null);
  if (emptyIdx === -1) return;
  state.blanks[emptyIdx] = fb.bank[bankIdx];
  state.bankUsed[bankIdx] = true;
  renderUnitView();
}

function removeFromBlank(blankIdx) {
  if (state.judged) return;
  const u = UNITS.find(x => x.id === state.activeUnit);
  const fb = u.fillBlanks[state.blankIdx];
  const word = state.blanks[blankIdx];
  if (!word) return;
  // Free the first matching used bank slot
  const bIdx = fb.bank.findIndex((w, i) => w === word && state.bankUsed[i]);
  if (bIdx !== -1) state.bankUsed[bIdx] = false;
  state.blanks[blankIdx] = null;
  renderUnitView();
}

function judge() {
  const u = UNITS.find(x => x.id === state.activeUnit);
  const fb = u.fillBlanks[state.blankIdx];
  const result = state.blanks.map((v, i) => v === fb.answers[i]);
  state.result = result;
  state.judged = true;
  stopTimer();
  renderUnitView();

  const allOk = result.every(x => x);
  if (allOk) {
    showConfetti();
    // Bump review count
    const p = state.progress[u.id] || {};
    updateUnitProgress(u.id, { reviewCount: (p.reviewCount || 0) + 1 });
  } else {
    // After 1.8s, return wrong words to bank
    setTimeout(() => {
      if (!state.judged) return; // guard
      const fb2 = u.fillBlanks[state.blankIdx];
      state.blanks.forEach((v, i) => {
        if (!result[i] && v !== null) {
          const bIdx = fb2.bank.findIndex((w, j) => w === v && state.bankUsed[j]);
          if (bIdx !== -1) state.bankUsed[bIdx] = false;
          state.blanks[i] = null;
        }
      });
      state.judged = false;
      state.result = null;
      state.startTime = Date.now() - (state.elapsed * 1000);
      startTimer();
      renderUnitView();
    }, 1800);
  }
}

function nextPractice() {
  const u = UNITS.find(x => x.id === state.activeUnit);
  if (state.blankIdx < u.fillBlanks.length - 1) {
    state.blankIdx++;
    resetPracticeState();
    renderUnitView();
  } else {
    backToDashboard();
  }
}

function prevPractice() {
  if (state.blankIdx > 0) {
    state.blankIdx--;
    resetPracticeState();
    renderUnitView();
  }
}

// ---------- Test Tab ----------
function renderTestTab(u) {
  if (state.quizShowResult) return renderQuizResult(u);

  const q = u.quiz[state.quizI];
  if (!q) return '<div class="card">問題がありません。</div>';

  let html = '<div class="quiz-card">';

  // Top: progress dots + count
  html += '<div class="quiz-top">';
  html += '<div style="font-size:13px;color:#888;">問題 ' + (state.quizI + 1) + ' / ' + u.quiz.length + '</div>';
  html += '<div class="quiz-progress-dots">';
  u.quiz.forEach((_, i) => {
    let cls = 'quiz-dot';
    if (i < state.quizAnswers.length) cls += state.quizAnswers[i] ? ' ok' : ' ng';
    else if (i === state.quizI) cls += ' current';
    html += '<div class="' + cls + '"></div>';
  });
  html += '</div></div>';

  html += '<div class="quiz-q">' + escapeHtml(q.q) + '</div>';

  // Feedback (between answer and next)
  if (state.quizFeedback) {
    if (state.quizFeedback.ok) {
      html += '<div class="quiz-fb-ok">✅ 正解です！</div>';
    } else {
      html += '<div class="quiz-fb-ng">❌ 不正解 — 正解は: ' + escapeHtml(state.quizFeedback.correct) + '</div>';
    }
  }

  // Input area
  if (q.type === 'mc') {
    html += '<div class="quiz-choices">';
    q.choices.forEach((c, i) => {
      const selected = state.quizChoice === i;
      const disabled = state.quizFeedback !== null;
      html += '<button class="quiz-choice' + (selected ? ' selected' : '') + '" ' +
              (disabled ? 'disabled' : '') +
              ' onclick="selectChoice(' + i + ')">' +
              '<span class="num">' + (i + 1) + '.</span>' + escapeHtml(c) + '</button>';
    });
    html += '</div>';

    if (!state.quizFeedback) {
      html += '<div style="text-align:right;"><button class="quiz-submit" ' +
              (state.quizChoice === null ? 'disabled' : '') +
              ' onclick="submitQuiz()">回答する</button></div>';
    }
  } else {
    // short answer
    html += '<input class="quiz-short-input" id="quiz-short" placeholder="答えを入力..." ' +
            'value="' + escapeHtml(state.quizShortVal) + '" ' +
            (state.quizFeedback !== null ? 'disabled' : '') +
            ' oninput="state.quizShortVal=this.value;document.getElementById(\'submit-short\').disabled=!this.value.trim();">';
    if (!state.quizFeedback) {
      html += '<div style="text-align:right;"><button id="submit-short" class="quiz-submit" ' +
              (state.quizShortVal.trim() === '' ? 'disabled' : '') +
              ' onclick="submitQuiz()">回答する</button></div>';
    }
  }

  html += '</div>';

  // Back button
  html += '<div style="margin-top:14px;text-align:center;">' +
          '<button class="back-btn" onclick="backToDashboard()">← 単元表に戻る</button></div>';

  return html;
}

function selectChoice(i) {
  state.quizChoice = i;
  renderUnitView();
}

function submitQuiz() {
  const u = UNITS.find(x => x.id === state.activeUnit);
  const q = u.quiz[state.quizI];
  let ok = false;
  let correctStr = '';

  if (q.type === 'mc') {
    if (state.quizChoice === null) return;
    ok = state.quizChoice === q.ans;
    correctStr = q.choices[q.ans];
  } else {
    const val = state.quizShortVal.trim();
    if (!val) return;
    // Check against any acceptable answer
    const answers = Array.isArray(q.ans) ? q.ans : [q.ans];
    ok = answers.some(a =>
      val.toLowerCase() === a.toLowerCase() ||
      val === a
    );
    correctStr = answers[0];
  }

  state.quizAnswers.push(ok);
  state.quizFeedback = { ok, correct: correctStr };
  renderUnitView();

  setTimeout(() => {
    // Advance
    if (state.quizI < u.quiz.length - 1) {
      state.quizI++;
      state.quizChoice = null;
      state.quizShortVal = '';
      state.quizFeedback = null;
      renderUnitView();
    } else {
      // Show result
      const correct = state.quizAnswers.filter(x => x).length;
      const pct = Math.round(correct / u.quiz.length * 100);
      const passed = pct >= 70;
      const p = state.progress[u.id] || {};
      const newBest = Math.max(p.bestScore || 0, pct);
      const patch = { bestScore: newBest };
      if (passed) {
        patch.passed = true;
        patch.testsPassed = (p.testsPassed || 0) + 1;
      }
      updateUnitProgress(u.id, patch);
      if (passed) showConfetti();
      state.quizShowResult = true;
      state.quizFeedback = null;
      renderUnitView();
    }
  }, 1200);
}

function renderQuizResult(u) {
  const correct = state.quizAnswers.filter(x => x).length;
  const pct = Math.round(correct / u.quiz.length * 100);
  const passed = pct >= 70;

  let html = '<div class="quiz-card">';
  html += '<div class="result-icon">' + (passed ? '🎉' : '💪') + '</div>';
  html += '<div class="result-score ' + (passed ? 'pass' : 'fail') + '">' +
          correct + ' / ' + u.quiz.length + ' (' + pct + '%)</div>';
  html += '<div class="result-msg">' +
          (passed ? '合格です！単元表にチェックがつきました ✅' : '70%以上で合格です。もう一度がんばりましょう！') +
          '</div>';

  // Review
  html += '<div class="result-review">';
  u.quiz.forEach((q, i) => {
    const ok = state.quizAnswers[i];
    const correctStr = q.type === 'mc' ? q.choices[q.ans] : (Array.isArray(q.ans) ? q.ans[0] : q.ans);
    html += '<div class="result-item">' +
            '<div>' + (ok ? '✅' : '❌') + ' Q' + (i + 1) + '. ' + escapeHtml(q.q) + '</div>';
    if (!ok) {
      html += '<div class="wrong-info">正解: ' + escapeHtml(correctStr) + '</div>';
    }
    html += '</div>';
  });
  html += '</div>';

  html += '<div class="result-btns">';
  html += '<button class="result-retry" onclick="retryQuiz()">🔄 もう一度挑戦</button>';
  if (passed) {
    html += '<button class="result-back" onclick="goNextUnit()">次の単元へ →</button>';
  }
  html += '<button class="result-back neutral" onclick="backToDashboard()">📋 単元表に戻る</button>';
  html += '</div>';

  html += '</div>';
  return html;
}

function retryQuiz() {
  resetQuizState();
  renderUnitView();
}

// ============================================================
// Init
// ============================================================
document.addEventListener('DOMContentLoaded', function () {
  renderDashboard();
});

// Fallback if DOMContentLoaded already fired
if (document.readyState === 'interactive' || document.readyState === 'complete') {
  renderDashboard();
}
</script>
